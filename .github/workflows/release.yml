name: Release

# Se dispara al empujar un tag con formato vX.Y.Z (ej: v1.0.1)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # Necesario para crear el GitHub Release

jobs:
  build-release:
    name: Build & Publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Build release APK
        env:
          SIGNING_STORE_FILE: upload-keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        run: flutter build apk --release

      - name: Rename APK with version
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/SistemDaily-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SistemDaily ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/SistemDaily-${{ github.ref_name }}.apk
